<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Call Proof Dashboard — CallVerdict</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="container">
        <nav>
            <ul><li><strong>CallVerdict</strong></li></ul>
            <ul><li><small>Proof Dashboard — {{ window_label }}</small></li></ul>
        </nav>
    </header>

    <main class="container">
        <!-- Stats -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <article style="text-align: center;">
                <h3 style="margin-bottom: 0;">{{ stats.total }}</h3>
                <small>Total Calls</small>
            </article>
            <article style="text-align: center;">
                <h3 style="margin-bottom: 0; color: var(--pico-color-green-500, green);">{{ stats.booked }}</h3>
                <small>Jobs Booked</small>
            </article>
            <article style="text-align: center;">
                <h3 style="margin-bottom: 0; color: var(--pico-color-red-500, red);">{{ stats.not_booked }}</h3>
                <small>Not Booked</small>
            </article>
            <article style="text-align: center;">
                <h3 style="margin-bottom: 0;">{{ stats.rate }}%</h3>
                <small>Conversion Rate</small>
            </article>
        </div>

        <!-- Calls table -->
        {% if calls %}
        <figure>
            <table role="grid">
                <thead>
                    <tr>
                        <th>Date</th>
                        {% if dashboard.tracking_lines | length > 1 %}
                        <th>Line</th>
                        {% endif %}
                        <th>Customer</th>
                        <th>Duration</th>
                        <th>Classification</th>
                        <th>Booking Time</th>
                        <th>Summary</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% for call in calls %}
                    <tr>
                        <td>{{ call.call_date.strftime('%d %b %Y %H:%M') if call.call_date else '—' }}</td>
                        {% if dashboard.tracking_lines | length > 1 %}
                        <td>{{ call.tracking_line.label if call.tracking_line else '—' }}</td>
                        {% endif %}
                        <td>{{ call.customer_name or '—' }}</td>
                        <td>{{ '%d:%02d'|format(call.call_duration // 60, call.call_duration % 60) if call.call_duration else '—' }}</td>
                        <td>
                            {% if call.classification == 'JOB_BOOKED' %}
                            <mark class="badge-booked">Job Booked</mark>
                            {% elif call.classification == 'NOT_BOOKED' %}
                            <mark class="badge-not-booked">Not Booked</mark>
                            {% elif call.classification == 'VOICEMAIL' %}
                            <mark class="badge-voicemail">Voicemail</mark>
                            {% else %}
                            {{ call.status | capitalize }}
                            {% endif %}
                        </td>
                        <td>{{ call.booking_time or '—' }}</td>
                        <td>{{ call.summary[:80] + '...' if call.summary and call.summary|length > 80 else call.summary or '—' }}</td>
                        <td><a href="/proof/{{ share_token }}/calls/{{ call.id }}">View</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </figure>
        {% else %}
        <article>
            <p>No calls found for this period.</p>
        </article>
        {% endif %}
    </main>

    <div class="container" style="text-align: center; padding: 1rem 0 0.5rem;">
        <a href="/welcome?utm_source=proof_dashboard&utm_medium=badge&utm_campaign=viral" style="display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 1rem; border-radius: 20px; background: rgba(16, 149, 193, 0.1); border: 1px solid rgba(16, 149, 193, 0.3); text-decoration: none; font-size: 0.8rem; color: var(--pico-muted-color);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="16" height="16"><circle cx="50" cy="50" r="45" fill="#1095c1"/><path d="M30 52l15 15 25-30" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Powered by <strong style="color: var(--pico-primary);">CallVerdict</strong>
        </a>
    </div>

    <footer class="container">
        <hr>
    </footer>
</body>
</html>
